<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll Animation</title>
    <script src="script.js" defer></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        
        .scroll-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
            overflow-x: scroll;
            overflow-y: hidden;
            scroll-behavior: smooth;
            white-space: nowrap;
        }
        
        .scroll-content {
            display: inline-flex;
            align-items: center;
            height: 300px;
            width: 1000px;
        }
        
        .item {
            width: 200px;
            height: 200px;
            background-color: #3498db;
            border-radius: 20px;
            margin: 0 -10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2em;
            color: white;
            transition: transform 0.5s ease, filter 0.5s ease, z-index 0s; /* Ustawienie płynniejszej animacji */
        }
    </style>
</head>
<body>

<div class="scroll-container">
    <div class="scroll-content">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
        <div class="item">5</div>

    </div>
</div>

<!--<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>-->


</body>
</html>
